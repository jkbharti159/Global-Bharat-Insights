services:
  - type: web
    name: news-analysis-modeler
    env: node
    plan: free # Standard free tier
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # User will prompt for this secret key in Render UI
